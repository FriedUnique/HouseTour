<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model</title>
    <style>
        /* Reset margins so the canvas touches the edges of the screen */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
        }

        /* 1. The Three.js Canvas */
        #pano-container {
            display: block;
            width: 100%;
            height: 100%;
            /* Keeps the canvas locked to the background */
            position: absolute; 
            top: 0;
            left: 0;
            z-index: 1; /* Bottom layer */
        }

        /* 2. The Map Overlay */
        #map-container {
            /* This breaks it out of normal document flow to float on top */
            position: absolute; 
        
            
            /* Visual styling (optional) */
            background-color: rgb(187, 157, 67); 
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            
            /* CRITICAL: Puts it ABOVE the canvas */
            z-index: 10; 
        }

        #loading-screen{
            position: absolute; 
            display: block;
            z-index: 15;
            background-color: rgb(46, 147, 187);
            pointer-events: none;
            transition: opacity 0.3s ease;
        }


        #loading-screen p{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            font-size: 35px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .map-room{
            position: absolute; 
        
            
            /* Visual styling (optional) */
            background-color: rgb(0, 0, 0); 
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            
            /* CRITICAL: Puts it ABOVE the canvas */
            z-index: 11; 
        }

        .map-room p{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            font-size: 35px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            pointer-events: none;
            
        }

        .small{
            /*mini map*/
            width: 300px; 
            height: 250px; 

            /*bottom right*/
            bottom: 20px; 
            right: 20px; 
        }

        .big{
            /*overlay map*/
            width: 100%;
            height: 100%;
        }

        .hide p{
            display: none;
        }

        .show{
            display: block;
        }

        .fadeHide{
            opacity: 0;
        }

        .fadeShow{
            opacity: 1;
        }

    </style>
</head>
<body>

    <div id="loading-screen" class="big fadeShow"><p>LOADING</p></div>

    <div id="map-container"></div>

    <canvas id="pano-container"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module" src="main.js">
    </script>
</body>
</html>
