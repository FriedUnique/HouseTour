<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model</title>
    <style>
        /* Reset margins so the canvas touches the edges of the screen */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
        }

        /* 1. The Three.js Canvas */
        #pano-container {
            display: block;
            width: 100%;
            height: 100%;
            /* Keeps the canvas locked to the background */
            position: absolute; 
            top: 0;
            left: 0;
            z-index: 1; /* Bottom layer */
        }

        /* 2. The Map Overlay */
        #map-container {
            /* This breaks it out of normal document flow to float on top */
            position: absolute; 
        
            
            /* Visual styling (optional) */
            background-color: rgb(187, 157, 67); 
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            
            /* CRITICAL: Puts it ABOVE the canvas */
            z-index: 10; 
        }

        .map-room{
            position: absolute; 
        
            
            /* Visual styling (optional) */
            background-color: rgb(0, 0, 0); 
            border-radius: 8px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
            
            /* CRITICAL: Puts it ABOVE the canvas */
            z-index: 11; 
        }

        .map-room p{
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            margin: 0;
            font-size: 35px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            pointer-events: none;
            
        }

        .small{
            /*mini map*/
            width: 300px; 
            height: 250px; 

            /*bottom right*/
            bottom: 20px; 
            right: 20px; 
        }

        .big{
            /*overlay map*/
            width: 100%;
            height: 100%;
        }

        .hide p{
            display: none;
        }

        .show{
            display: block;
        }

    </style>
</head>
<body>

    <div id="map-container" >
        </div>

    <canvas id="pano-container"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import Room from "/main.js";


        const Mode = Object.freeze({
           MAP: 0,
           PANORAMA: 1,
           OUTSIDE: 2 
        });

        let viewMode = Mode.PANORAMA;

        const loader = new GLTFLoader();


        let currentActiveRoom = 0 // the id of the currently selected room;
        


        async function loadRoomData() {
            try {
                const response = await fetch('roomData.json');
                const data = await response.json();
                
                // Pass the specific part of the data to your function
                return initRooms(data.rooms);
                
            } catch (error) {
                console.error("Oops, map data failed to load:", error);
            }
        }

        function initRooms(roomData){
            let i = 0
            let rooms = [];
            roomData.forEach(room => {
                let roomDiv = document.createElement("div");

                roomDiv.classList.add("hide");
                roomDiv.classList.add("map-room");
                roomDiv.id = `${i}`;

                roomDiv.style.left = room.centerX + "px";
                roomDiv.style.top = room.centerY + "px";
                roomDiv.style.width = room.width + "px";
                roomDiv.style.height = room.height + "px";

                roomDiv.innerHTML += "<p>"+ room.name +"</p>";
                
                roomDiv.addEventListener("click", (e)=>{
                    let roomId = e.srcElement.id;
                    console.log("Teleport to room id " + roomId);
                    currentActiveRoom = roomId;

                    console.log(roomList[roomId])
                    

                    let tpPos = roomList[roomId].tpPosition;
                    moveCamera(tpPos); 
                    mapHandler();
                })


                console.log(room.model);

                document.getElementById("map-container").appendChild(roomDiv);
                // document.body.appendChild(roomDiv);

                rooms.push(new Room(room.centerX, room.centerY, room.height, room.width, new THREE.Vector3(room.tpPositionX, 0, room.tpPositionZ), room.model, i));
                i++;
            });

            return rooms;
        }

        // async function, make the program wait until its finished loading
        const roomList = await loadRoomData();


       

        let mapContainer = document.getElementById("map-container")
        mapContainer.classList.add("small")

        let oldModel = null;



        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        const camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.1, 1000);
    

        
        const canvas = document.querySelector('#pano-container');
        const renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = false;
        controls.enablePan = false;
        controls.rotateSpeed = -0.2;
        
        

        function createModel(modelLocation){
            if(!modelLocation) return;

            if(oldModel !== null){
                scene.remove(oldModel);
                oldModel.geometry.dispose();
                oldModel.material.map.dispose(); // Disposes the loaded image
                oldModel.material.dispose();
            }

            loader.load( modelLocation, function ( gltf ) {

                oldModel = gltf.scene;
                const box = new THREE.Box3().setFromObject(oldModel);
                const center = box.getCenter(new THREE.Vector3());
                oldModel.position.sub(center); 

                scene.add(oldModel);

                    // loading screen here
            }, (xhr) => { /*console.log((xhr.loaded / xhr.total * 100) + '% loaded');*/ },
            (error) => { console.error("An error happened:", error); });

        }

        

        const light = new THREE.AmbientLight(0xF8F8F8, 2);
        scene.add(light);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 3);
        directionalLight.position.set(5, 10, 7.5);
        scene.add(directionalLight);







        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onKeyPressed(e){
            if(e.key === "p"){
                mapHandler();
            }else if(e.key === "q"){
                console.log(camera.position);
            }
            
        }

        function moveCamera(positionVector){
            // fix for the look around movement gemini tha goat

            camera.position.set(positionVector.x, positionVector.y, positionVector.z); 

            controls.target.set(
                positionVector.x, 
                positionVector.y, 
                positionVector.z + 0.1
            );
        }

        function mapHandler(){
            switch (viewMode) {
                    case Mode.MAP:
                        mapContainer.classList.remove("big");
                        mapContainer.classList.add("small");

                        hideRooms();

                        viewMode = Mode.PANORAMA;
                        break;

                    case Mode.PANORAMA:
                        mapContainer.classList.remove("small");
                        mapContainer.classList.add("big");


                        showRooms();

                        viewMode = Mode.MAP;
                        break;
                
                    default:
                        break;
                }
        }


        function showRooms(){
            roomList.forEach(room => {
                let roomElement = document.getElementById(room.divId);
                roomElement.classList.remove("hide");
                roomElement.classList.add("show");

                roomElement.style.left = room.centerX + "px";
                roomElement.style.top = room.centerY + "px";
                roomElement.style.width = room.width + "px";
                roomElement.style.height = room.height + "px";


                if(room.divId == currentActiveRoom){
                    roomElement.style.backgroundColor = "green";
                }else{
                    roomElement.style.backgroundColor = "black";
                }
            });
        }

        function hideRooms(){
            roomList.forEach(room => {
                let roomElement = document.getElementById(room.divId);
                roomElement.classList.remove("show");
                roomElement.classList.add("hide");

                roomElement.style.left = room.centerX*0.3 + "px";
                roomElement.style.top = room.centerY*0.3 + "px";
                roomElement.style.width = room.width*0.3 + "px";
                roomElement.style.height = room.height*0.3 + "px";
                
            });
        }


        function playerMapLook(){

        }

        function loadingCircle(){
            // when loading the model
        }



        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        createModel("HouseModel.glb")

        window.addEventListener('resize', onWindowResize, false);
        window.addEventListener("keypress", onKeyPressed)

        moveCamera(roomList[currentActiveRoom].tpPosition); 

        animate();
    </script>
</body>
</html>
